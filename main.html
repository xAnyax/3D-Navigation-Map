<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Navigation map</title>
        <link type="text/css" rel="stylesheet" href="style.css">
        <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
        <script type="importmap">
            {
              "imports": {
                "three": "https://unpkg.com/three@v0.153.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@v0.153.0/examples/jsm/"
              }
            }
          </script>
    </head>

    <body style="cursor: auto;">
        <noscript>Enable JavaScript to run this program.</noscript>

        <div class="header">3D model Navigation Map</div>
        <div class="navbar"></div>
        <div class="container">
          <div class="sidebar">
              <div class="search">
                Search Room
                <br><label for="fromroom">From:</label>
                <br><select id="fromroom">
                  <option value="501">501</option>
                  <option value="502">502</option>
                  <option value="503">503</option>
                  <option value="504">504</option>
                  <option value="505">505</option>
                  <option value="506">506</option>
                  <option value="507">507</option>
                  <option value="508">508</option>
                  <option value="509">509</option>
                  <option value="510">510</option>
                </select>
                <br><label for="toroom">To:</label>
                <br><select id="toroom">
                  <option value="501">501</option>
                  <option value="502">502</option>
                  <option value="503">503</option>
                  <option value="504">504</option>
                  <option value="505">505</option>
                  <option value="506">506</option>
                  <option value="507">507</option>
                  <option value="508">508</option>
                  <option value="509">509</option>
                  <option value="510">510</option>
                </select>
              </div>
              <div class="legends"></div>
          </div>
          <div id="3d-container" tabindex="0">
            <div id="minimap"></div>
            <div id="blocker">
              <div id="instructions"></div>
            </div>
          </div>
        </div>
        <script type="module" src="./map.js"></script>
    </body>
</html>
