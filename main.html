<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Navigation Map</title>
  <link type="text/css" rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.3/addons/p5.sound.min.js"></script>
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
  <script type="importmap">
            {
              "imports": {
                "three": "https://unpkg.com/three@v0.163.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@v0.163.0/examples/jsm/"
              }
            }
  </script>
</head>

<body onload="hidebox()">
  <div class="header">HKU SPACE 3D model Navigation Map</div>
  <div class="navbar"></div>
  <div class="container">
    <div class="sidebar">
      <div class="search">
        <div id="searchword">
          Search Path
        </div>
        <div id="box">
            <div id="fromcircle"></div>
            <div id="word">From :</div>
        </div>
        <input id='start_input' name="start" list="startIn">
        <label id="selector_label_start" for="startIn"></label>
        <br><datalist id="startIn">
          <option value="501">501</option>
          <option value="502">502</option>
          <option value="503">503</option>
          <option value="504">504</option>
          <option value="505">505</option>
          <option value="506">506</option>
          <option value="507">507</option>
          <option value="508">508</option>
          <option value="509">509</option>
          <option value="510">510</option>
          <option value="601">601</option>
          <option value="602">602</option>
          <option value="603">603</option>
          <option value="604">604</option>
          <option value="605">605</option>
          <option value="606">606</option>
          <option value="607">607</option>
          <option value="608">608</option>
          <option value="609">609</option>
          <option value="610">610</option>
          <option value="Male Toilet">Male Toilet</option>
          <option value="Female Toilet">Female Toilet</option>
          <option value="Elevator">Elevator</option>
          <option value="Escalator">Escalator</option>
        </datalist>

        <div id="box">
            <div id="tocircle"></div>
            <div id="word">To :</div>
        </div>
        <input id='end_input' name="end" list="endIn">
        <br><label id="selector_label_end" for="end"></label>
        <br><datalist id="endIn" name="end">
          <option value="501">501</option>
          <option value="502">502</option>
          <option value="503">503</option>
          <option value="504">504</option>
          <option value="505">505</option>
          <option value="506">506</option>
          <option value="507">507</option>
          <option value="508">508</option>
          <option value="509">509</option>
          <option value="510">510</option>
          <option value="601">601</option>
          <option value="602">602</option>
          <option value="603">603</option>
          <option value="604">604</option>
          <option value="605">605</option>
          <option value="606">606</option>
          <option value="607">607</option>
          <option value="608">608</option>
          <option value="609">609</option>
          <option value="610">610</option>
          <option value="Male Toilet">Male Toilet</option>
          <option value="Female Toilet">Female Toilet</option>
          <option value="Accessible Toilet">Accessible Toilet</option>
          <option value="Elevator">Elevator</option>
          <option value="Escalator">Escalator</option>

        </datalist>
        <button id="run" onclick=run()>Start</button>
      </div>
      <div class="legends">
        <div id="legendword">
          Legends
        </div>
        <table>
          <tr>
            <td><img src="pics/accessibletoilet.png" width="50px" height="50px"></td>
            <td style="padding-left: 15px;">Accessible Toilet</td>
          </tr>
          <tr>
            <td><img src="pics/maletoilet.png" width="50px" height="50px"></td>
            <td style="padding-left: 15px;">Male Toilet</td>
          </tr>
          <tr>
            <td><img src="pics/femaletoilet.png" width="50px" height="50px"></td>
            <td style="padding-left: 15px;">Female Toilet</td>
          </tr>
          <tr>
            <td><img src="pics/escalator.png" width="50px" height="50px"></td>
            <td style="padding-left: 15px;">Escalator</td>
          </tr>
          <tr>
            <td><img src="pics/lift.png" width="50px" height="50px"></td>
            <td style="padding-left: 15px;">Elevator</td>
          </tr>
          <tr>
            <td><img src="pics/classroom.png" width="50px" height="50px"></td>
            <td style="padding-left: 15px;">Classroom</td>
          </tr>
          <tr>
            <td><img src="pics/landscapedarea.png" width="50px" height="50px"></td>
            <td style="padding-left: 15px;">Landscaped Area</td>
          </tr>
        </table>
      </div>
    </div>

    <div id="mapcontainer">
      <div id="twodmapcontainer">
        <div id="errormessage"></div>
        <div id="floorcontainer">
          <div id="floor">
            Floor
          </div>
          <div id="floor5">
            <button id="map_5f" style="background-image: url(pics/5F.png);"></button>
          </div>
          <div id="floor6">
            <button id="map_6f" style="background-image: url(pics/6F.png);"></button>
          </div>
        </div>
        <div id="btncontainer">
          <div id="zoominbtn">
            <button id="zoomin" type="button" onclick="zoomin()"
              style="background-image: url(pics/zoomin.png);"></button>
          </div>
          <div id="zoomoutbtn">
            <button id="zoomout" type="button" onclick="zoomout()"
              style="background-image: url(pics/zoomout.png);"></button>
          </div>
          <div id="switchbtn">
            <button id="switchmap" type="button" style="background-image: url(pics/3D.png);"></button>
          </div>
        </div>
      </div>
      <div id="threedcontainer">
        <div id="threedmodel"></div>
        <div id="minimapContainer">
          <button id="switch2d" type="button" style="background-image: url(pics/cross.png);"></button>
        </div>
      </div>
    </div>
  </div>
  <script src="Node.js"></script>
  <script type="module" src="./map.js"></script>
  <script src="aStar_diagonal_final_path_only.js"></script>
</body>

</html>
