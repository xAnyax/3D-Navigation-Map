<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Navigation map</title>
        <link type="text/css" rel="stylesheet" href="style.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.3/addons/p5.sound.min.js"></script>
        <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
        <script type="importmap">
            {
              "imports": {
                "three": "https://unpkg.com/three@v0.153.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@v0.153.0/examples/jsm/"
              }
            }
          </script>
    </head>

    <body style="cursor: auto;" onload="run()">
        <noscript>Enable JavaScript to run this program.</noscript>

        <div class="header">HKU SPACE 3D model Navigation Map</div>
        <div class="navbar"></div>
        <div class="container">
          <div class="sidebar">
              <div class="search">
                <div id="searchword">
                  Search Path
                </div>
                <br>From:
                <br><input id='start_input' name="start" list="startIn" value="601"> 
                <label id="selector_label_start" for="startIn"></label>
                <br><datalist id="startIn">
                  <option value="501">501</option>
                  <option value="502">502</option>
                  <option value="503">503</option>
                  <option value="504">504</option>
                  <option value="505">505</option>
                  <option value="506">506</option>
                  <option value="507">507</option>
                  <option value="508">508</option>
                  <option value="509">509</option>
                  <option value="510">510</option>
                  <option value="601">601</option>
                  <option value="602">602</option>
                  <option value="escalator">escalator</option>
                  <!-- <option value="floor6">floor6</option> -->
                </datalist>

                <br>To:
                <br><input id='end_input' name="end" list="endIn" value="602"> 
                <br><label id="selector_label_end" for="end"></label>
                <br><datalist id="endIn" name="end">
                  <option value="501">501</option>
                  <option value="502">502</option>
                  <option value="503">503</option>
                  <option value="504">504</option>
                  <option value="505">505</option>
                  <option value="506">506</option>
                  <option value="507">507</option>
                  <option value="508">508</option>
                  <option value="509">509</option>
                  <option value="510">510</option>
                  <option value="601">601</option>
                  <option value="602">602</option>
                  <option value="escalator">escalator</option>
                  
                </datalist>
                <br><button id="run" onclick=run()>Start</button>
              </div>
              <div class="legends">
                <div id="legendword">
                  Legends
                </div>
              </div>
          </div>

          <div id="mapcontainer">
            <div id="twodmapcontainer">
              <div id="floorcontainer">
                <div id="floor">
                  Floor
                </div>
                <div id="floor5">
                  <button id="map_5f">5/F</button>
                </div>
                <div id="floor6">
                  <button id="map_6f">6/F</button>
                </div>
              </div>
              <div id="btncontainer">
                <div id="zoominbtn">
                  <button id="zoomin" type="button" onclick="zoomIn()" style="background-image: url(pics/zoomin.png);"></button>
                </div>
                <div id="zoomoutbtn">
                  <button id="zoomout" type="button" onclick="zoomOut()" style="background-image: url(pics/zoomout.png);"></button>
                </div>
                <div id="switchbtn">
                  <button id="switchmap" type="button" style="background-image: url(pics/3D.png);"></button>
                </div>
              </div>
            </div>
            <div id="threedcontainer">
              <div id="minimap">
                <button id="switch2d" type="button"></button>
              </div>
            </div>
          </div>
        </div>
        <script src="Node.js"></script>
        <script src="aStar_diagonal_final_path_only.js"></script>
        <script type="module" src="./map.js"></script>
    </body>
</html>
